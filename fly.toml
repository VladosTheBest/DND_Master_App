app = "shadow-edge-gm"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  SHADOW_EDGE_WEB_DIR = "/app/apps/web/dist"
  SHADOW_EDGE_DATA_FILE = "/data/store.json"
  SHADOW_EDGE_BESTIARY_CACHE_FILE = "/data/dndsu-bestiary.json"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/healthz"

[[mounts]]
  source = "shadow_edge_data"
  destination = "/data"
  initial_size = "2gb"
