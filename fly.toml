# fly.toml app configuration file generated for dnd-master-app on 2026-04-24T15:36:01Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'dnd-master-app'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'
  SHADOW_EDGE_BESTIARY_CACHE_FILE = '/data/dndsu-bestiary.json'
  SHADOW_EDGE_DATA_FILE = '/data/store.json'
  SHADOW_EDGE_WEB_DIR = '/app/apps/web/dist'

[[mounts]]
  source = 'shadow_edge_data'
  destination = '/data'
  initial_size = '2gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
